name: Sync Main to Release + PyPI

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sync-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package name + version
        id: pkg
        run: |
          python -c "import tomllib; data = tomllib.load(open('pyproject.toml', 'rb')); print(f'name={data[\"project\"][\"name\"]}'); print(f'version={data[\"project\"][\"version\"]}')" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: pypi
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          python -c "
          import json, os, urllib.error, urllib.request
          name = os.environ['PACKAGE_NAME']
          ver = os.environ['PACKAGE_VERSION']
          url = f'https://pypi.org/pypi/{name}/{ver}/json'
          exists = False
          try:
              with urllib.request.urlopen(url) as resp:
                  json.loads(resp.read().decode('utf-8'))
              exists = True
          except urllib.error.HTTPError as exc:
              if exc.code != 404: raise
          out = os.environ.get('GITHUB_OUTPUT')
          if out:
              with open(out, 'a', encoding='utf-8') as f:
                  f.write(f'exists={str(exists).lower()}\\n')
          print(f'PyPI version exists: {exists}')
          "

      - name: Ensure git identity (syedawais355)
        if: steps.pypi.outputs.exists != 'true'
        run: |
          git config user.name "syedawais355"
          git config user.email "syedawais355@users.noreply.github.com"

      - name: Create tag for version if missing
        if: steps.pypi.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        if: steps.pypi.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          python -c "
          import re
          from pathlib import Path
          version = '${{ env.VERSION }}'
          content = Path('CHANGELOG.md').read_text(encoding='utf-8')
          pattern = rf'## \[{version}\] - \d{{4}}-\d{{2}}-\d{{2}}(.*?)## \['
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              pattern = rf'## \[{version}\] - \d{{4}}-\d{{2}}-\d{{2}}(.*)'
              match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
              with open('release_notes.md', 'w', encoding='utf-8') as f:
                  f.write(notes)
          else:
              with open('release_notes.md', 'w', encoding='utf-8') as f:
                  f.write(f'Automated release for v{version}')
          "

      - name: Create GitHub Release if missing
        if: steps.pypi.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --notes-file release_notes.md
