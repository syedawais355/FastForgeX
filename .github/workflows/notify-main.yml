name: Notify Main Changes

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  email-main-change:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
    steps:
      - name: Send email for main branch change
        if: env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.NOTIFY_EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT != '' && env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          secure: false
          to: ${{ env.NOTIFY_EMAIL_TO }}
          from: ${{ env.SMTP_USERNAME }}
          subject: "[FastForgeX] main updated: ${{ github.sha }}"
          body: |
            A change was merged/pushed to main.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}
            Compare: ${{ github.event.compare }}
