name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
    outputs:
      package_version: ${{ steps.package-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build twine

      - name: Resolve package version
        id: package-version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Validate release tag matches package version
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          EXPECTED_TAG="v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag mismatch."
            echo "Expected: $EXPECTED_TAG"
            echo "Actual:   $RELEASE_TAG"
            exit 1
          fi
          echo "Release tag matches package version: $RELEASE_TAG"

      - name: Validate release commit is current main HEAD
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          git fetch origin main --depth=1
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$RELEASE_SHA" != "$MAIN_SHA" ]; then
            echo "Release commit is not the latest main commit."
            echo "main HEAD:    $MAIN_SHA"
            echo "release SHA:  $RELEASE_SHA"
            exit 1
          fi
          echo "Release commit is aligned with main HEAD."

      - name: Check whether version already exists on PyPI
        id: pypi-version-check
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          STATUS=$(python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/fastforgex/{version}/json"
          try:
              with urllib.request.urlopen(url) as resp:
                  print(resp.status)
          except urllib.error.HTTPError as exc:
              print(exc.code)
          PY
          )
          if [ "$STATUS" = "200" ]; then
            echo "Version $PACKAGE_VERSION already exists on PyPI."
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$STATUS" != "404" ]; then
            echo "Unexpected PyPI response status: $STATUS"
            exit 1
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Version $PACKAGE_VERSION is new and can be published."

      - name: Build distribution
        if: steps.pypi-version-check.outputs.exists != 'true'
        run: python -m build

      - name: Verify wheel matches source files
        if: steps.pypi-version-check.outputs.exists != 'true'
        run: python scripts/verify_wheel_matches_source.py --dist-dir dist

      - name: Verify wheel CLI version
        if: steps.pypi-version-check.outputs.exists != 'true'
        run: python scripts/verify_wheel_version.py --dist-dir dist

      - name: Check distribution
        if: steps.pypi-version-check.outputs.exists != 'true'
        run: twine check dist/*

      - name: Publish to PyPI
        if: steps.pypi-version-check.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Report already published version
        if: steps.pypi-version-check.outputs.exists == 'true'
        run: echo "Skipping publish because version already exists on PyPI."

      - name: Notify publish success by email
        if: success() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.NOTIFY_EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT != '' && env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          secure: false
          to: ${{ env.NOTIFY_EMAIL_TO }}
          from: ${{ env.SMTP_USERNAME }}
          subject: "[FastForgeX] PyPI publish success v${{ steps.package-version.outputs.version }}"
          body: |
            FastForgeX publish workflow completed successfully.
            Existing on PyPI before run: ${{ steps.pypi-version-check.outputs.exists }}

            Repository: ${{ github.repository }}
            Branch/Ref: ${{ github.ref }}
            Version: ${{ steps.package-version.outputs.version }}
            Actor: ${{ github.actor }}
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify publish failure by email
        if: failure() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.NOTIFY_EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT != '' && env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          secure: false
          to: ${{ env.NOTIFY_EMAIL_TO }}
          from: ${{ env.SMTP_USERNAME }}
          subject: "[FastForgeX] PyPI publish FAILED v${{ steps.package-version.outputs.version }}"
          body: |
            FastForgeX publish workflow failed.

            Repository: ${{ github.repository }}
            Branch/Ref: ${{ github.ref }}
            Version: ${{ steps.package-version.outputs.version }}
            Actor: ${{ github.actor }}
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
