name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    name: Release and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build twine

      - name: Resolve package metadata
        id: pkg
        run: |
          python - << 'PYEOF'
          import sys
          if sys.version_info >= (3, 11):
              import tomllib
          else:
              try:
                  import tomllib
              except ImportError:
                  import tomli as tomllib
          import os
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          name = data["project"]["name"]
          version = data["project"]["version"]
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"name={name}\n")
                  f.write(f"version={version}\n")
          print(f"name={name} version={version}")
          PYEOF

      - name: Check if version already exists on PyPI
        id: pypi_check
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          python - << 'PYEOF'
          import json, os, urllib.error, urllib.request
          name = os.environ["PACKAGE_NAME"]
          ver = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{name}/{ver}/json"
          exists = False
          try:
              with urllib.request.urlopen(url) as resp:
                  json.loads(resp.read().decode("utf-8"))
              exists = True
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"exists={'true' if exists else 'false'}\n")
          print(f"PyPI version exists: {exists}")
          PYEOF

      - name: Build distribution
        run: python -m build

      - name: Verify wheel matches source
        run: python scripts/verify_wheel_matches_source.py --dist-dir dist

      - name: Verify wheel CLI version
        run: python scripts/verify_wheel_version.py --dist-dir dist

      - name: Check distribution integrity
        run: twine check dist/*

      - name: Configure git identity
        if: steps.pypi_check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push version tag
        if: steps.pypi_check.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping tag creation."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag: ${TAG}"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.pypi_check.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          python - << 'PYEOF'
          import re, os
          from pathlib import Path
          version = os.environ["VERSION"]
          content = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}(.*?)(?=## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else f"Release v{version}"
          Path("release_notes.md").write_text(notes, encoding="utf-8")
          print(f"Extracted release notes for v{version}")
          PYEOF

      - name: Create GitHub Release
        if: steps.pypi_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file release_notes.md
            echo "Created GitHub Release: ${TAG}"
          fi

      - name: Publish to PyPI
        if: steps.pypi_check.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Skip publish (version already on PyPI)
        if: steps.pypi_check.outputs.exists == 'true'
        run: echo "Version ${{ steps.pkg.outputs.version }} already exists on PyPI. Skipping publish."