name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Enforce version bump for package changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/enforce_version_bump.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: mypy fastforgex

      - name: Build package
        run: pip install build && python -m build

      - name: Verify wheel matches source files
        run: python scripts/verify_wheel_matches_source.py --dist-dir dist

      - name: Verify wheel CLI version
        run: python scripts/verify_wheel_version.py --dist-dir dist

      - name: Check package with twine
        run: pip install twine && twine check dist/*

      - name: Run tests
        run: pytest -v --tb=short
